apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "memobuild.fullname" . }}
  labels:
    {{- include "memobuild.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "memobuild.fullname" . }}
  labels:
    {{- include "memobuild.labels" . | nindent 4 }}
data:
  MEMOBUILD_STORAGE_BACKEND: {{ .Values.storage.backend | quote }}
  {{- if eq .Values.storage.backend "s3" }}
  MEMOBUILD_STORAGE_BUCKET: {{ .Values.storage.s3.bucket | quote }}
  {{- if .Values.storage.s3.endpoint }}
  MEMOBUILD_STORAGE_ENDPOINT: {{ .Values.storage.s3.endpoint | quote }}
  {{- end }}
  MEMOBUILD_STORAGE_REGION: {{ .Values.storage.s3.region | quote }}
  {{- end }}
  {{- if eq .Values.storage.backend "gcs" }}
  MEMOBUILD_STORAGE_BUCKET: {{ .Values.storage.gcs.bucket | quote }}
  {{- end }}
  {{- if .Values.postgresql.enabled }}
  MEMOBUILD_DATABASE_URL: {{ printf "postgresql://%s@%s:%d/%s" .Values.postgresql.user .Values.postgresql.host .Values.postgresql.port .Values.postgresql.database | quote }}
  {{- end }}
  {{- if .Values.redis.enabled }}
  MEMOBUILD_REDIS_URL: {{ printf "redis://%s:%d" .Values.redis.host .Values.redis.port | quote }}
  {{- end }}
  MEMOBUILD_LOG_LEVEL: {{ .Values.env.MEMOBUILD_LOG_LEVEL | quote }}
  MEMOBUILD_GC_INTERVAL_HOURS: {{ .Values.env.MEMOBUILD_GC_INTERVAL_HOURS | quote }}
  MEMOBUILD_MAX_CONCURRENT_BUILDS: {{ .Values.env.MEMOBUILD_MAX_CONCURRENT_BUILDS | quote }}
  {{- if .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT }}
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.env.OTEL_EXPORTER_OTLP_ENDPOINT | quote }}
  {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "memobuild.fullname" . }}
  labels:
    {{- include "memobuild.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  clusterIP: None
  ports:
    {{- range .Values.service.ports }}
    - name: {{ .name }}
      port: {{ .port }}
      targetPort: {{ .targetPort }}
      protocol: {{ .protocol }}
    {{- end }}
  selector:
    {{- include "memobuild.selectorLabels" . | nindent 4 }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "memobuild.fullname" . }}
  labels:
    {{- include "memobuild.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "memobuild.fullname" . }}
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  selector:
    matchLabels:
      {{- include "memobuild.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- toYaml .Values.podAnnotations | nindent 8 }}
      labels:
        {{- include "memobuild.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "memobuild.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      {{- end }}
      containers:
      - name: memobuild
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
        env:
        - name: MEMOBUILD_NODE_ID
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        envFrom:
        - configMapRef:
            name: {{ include "memobuild.fullname" . }}
        {{- if .Values.postgresql.enabled }}
        - secretRef:
            name: {{ .Values.postgresql.secretName }}
        {{- end }}
        {{- if .Values.redis.enabled }}
        - secretRef:
            name: {{ .Values.redis.secretName }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        securityContext:
          {{- toYaml .Values.securityContext | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: config
          mountPath: /etc/memobuild
      volumes:
      - name: config
        configMap:
          name: {{ include "memobuild.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "memobuild.fullname" . }}
  labels:
    {{- include "memobuild.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "memobuild.selectorLabels" . | nindent 6 }}
---
{{- end }}
---
{{- if .Values.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "memobuild.fullname" . }}
  labels:
    {{- include "memobuild.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: {{ include "memobuild.fullname" . }}
  minReplicas: {{ .Values.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.autoscaling.maxReplicas }}
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.targetCPUUtilizationPercentage }}
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: {{ .Values.autoscaling.targetMemoryUtilizationPercentage }}
---
{{- end }}
---
{{- if .Values.monitoring.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "memobuild.fullname" . }}
  labels:
    {{- include "memobuild.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "memobuild.selectorLabels" . | nindent 6 }}
  endpoints:
  - port: metrics
    path: /metrics
    interval: {{ .Values.monitoring.prometheus.serviceMonitor.interval }}
---
{{- end }}