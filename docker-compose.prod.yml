version: '3.8'

services:
  # MemoBuild Cluster Nodes
  memobuild-node1:
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        TARGETARCH: amd64
    container_name: memobuild-node1
    ports:
      - "9090:8080"
    environment:
      - MEMOBUILD_NODE_ID=node1
      - MEMOBUILD_CLUSTER_PEERS=http://memobuild-node2:8080,http://memobuild-node3:8080
      - MEMOBUILD_DATABASE_URL=postgresql://memobuild:password@postgres:5432/memobuild
      - MEMOBUILD_REDIS_URL=redis://redis:6379
      - MEMOBUILD_STORAGE_BACKEND=s3
      - MEMOBUILD_STORAGE_BUCKET=memobuild-cache
      - MEMOBUILD_STORAGE_ENDPOINT=http://minio:9000
      - MEMOBUILD_STORAGE_ACCESS_KEY=minioadmin
      - MEMOBUILD_STORAGE_SECRET_KEY=minioadmin
      - MEMOBUILD_LOG_LEVEL=info
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - memobuild-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "memobuild", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  memobuild-node2:
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        TARGETARCH: amd64
    container_name: memobuild-node2
    ports:
      - "9091:8080"
    environment:
      - MEMOBUILD_NODE_ID=node2
      - MEMOBUILD_CLUSTER_PEERS=http://memobuild-node1:8080,http://memobuild-node3:8080
      - MEMOBUILD_DATABASE_URL=postgresql://memobuild:password@postgres:5432/memobuild
      - MEMOBUILD_REDIS_URL=redis://redis:6379
      - MEMOBUILD_STORAGE_BACKEND=s3
      - MEMOBUILD_STORAGE_BUCKET=memobuild-cache
      - MEMOBUILD_STORAGE_ENDPOINT=http://minio:9000
      - MEMOBUILD_STORAGE_ACCESS_KEY=minioadmin
      - MEMOBUILD_STORAGE_SECRET_KEY=minioadmin
      - MEMOBUILD_LOG_LEVEL=info
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - memobuild-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "memobuild", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  memobuild-node3:
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        TARGETARCH: amd64
    container_name: memobuild-node3
    ports:
      - "9092:8080"
    environment:
      - MEMOBUILD_NODE_ID=node3
      - MEMOBUILD_CLUSTER_PEERS=http://memobuild-node1:8080,http://memobuild-node2:8080
      - MEMOBUILD_DATABASE_URL=postgresql://memobuild:password@postgres:5432/memobuild
      - MEMOBUILD_REDIS_URL=redis://redis:6379
      - MEMOBUILD_STORAGE_BACKEND=s3
      - MEMOBUILD_STORAGE_BUCKET=memobuild-cache
      - MEMOBUILD_STORAGE_ENDPOINT=http://minio:9000
      - MEMOBUILD_STORAGE_ACCESS_KEY=minioadmin
      - MEMOBUILD_STORAGE_SECRET_KEY=minioadmin
      - MEMOBUILD_LOG_LEVEL=info
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - memobuild-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "memobuild", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: memobuild-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=memobuild
      - POSTGRES_USER=memobuild
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - memobuild-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memobuild -d memobuild"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: memobuild-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - memobuild-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: memobuild-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - memobuild-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: memobuild-prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - memobuild-network
    restart: unless-stopped
    depends_on:
      - memobuild-node1
      - memobuild-node2
      - memobuild-node3

  # Grafana Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: memobuild-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    networks:
      - memobuild-network
    restart: unless-stopped
    depends_on:
      - prometheus

  # Jaeger Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: memobuild-jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - memobuild-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:

networks:
  memobuild-network:
    driver: bridge
