apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: memobuild-cluster
  namespace: memobuild
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: memobuild
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: memobuild-cluster
  namespace: memobuild
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: memobuild-cluster
  minReplicas: 1
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: memobuild-cluster
  namespace: memobuild
spec:
  podSelector:
    matchLabels:
      app: memobuild
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: memobuild
    - namespaceSelector:
        matchLabels:
          name: ci-runner
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: memobuild-cluster
value: 1000000
globalDefault: false
description: "Priority for MemoBuild cluster pods - prevents eviction under node pressure"