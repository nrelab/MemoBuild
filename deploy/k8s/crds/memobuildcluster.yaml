apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: memobuildclusters.build.nrelab.io
  annotations:
    cert-manager.io/inject-ca-from: memobuild/memobuild-serving-cert
spec:
  group: build.nrelab.io
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                replicas:
                  type: integer
                  minimum: 1
                  maximum: 10
                replicationFactor:
                  type: integer
                  minimum: 1
                  maximum: 3
                image:
                  type: object
                  properties:
                    repository:
                      type: string
                    tag:
                      type: string
                    pullPolicy:
                      type: string
                      enum: [Always, IfNotPresent, Never]
                storageBackend:
                  type: string
                  enum: [s3, gcs, local]
                storageConfig:
                  type: object
                  properties:
                    bucket:
                      type: string
                    endpoint:
                      type: string
                    region:
                      type: string
                    accessKey:
                      type: string
                    secretKey:
                      type: string
                tlsSecretRef:
                  type: object
                  properties:
                    name:
                      type: string
                    certPath:
                      type: string
                    keyPath:
                      type: string
                    caPath:
                      type: string
                postgresRef:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    host:
                      type: string
                    port:
                      type: integer
                    database:
                      type: string
                    user:
                      type: string
                    secretRef:
                      type: string
                redisRef:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    host:
                      type: string
                    port:
                      type: integer
                    secretRef:
                      type: string
                scalingPolicy:
                  type: object
                  properties:
                    minReplicas:
                      type: integer
                    maxReplicas:
                      type: integer
                    targetCpuPercent:
                      type: integer
                    targetMemoryPercent:
                      type: integer
                resources:
                  type: object
                  properties:
                    requests:
                      type: object
                      additionalProperties:
                        type: string
                    limits:
                      type: object
                      additionalProperties:
                        type: string
                nodeSelector:
                  type: object
                  additionalProperties:
                    type: string
                tolerations:
                  type: array
                  items:
                    type: object
                affinity:
                  type: object
            status:
              type: object
              properties:
                readyReplicas:
                  type: integer
                replicas:
                  type: integer
                conditions:
                  type: array
                  items:
                    type: object
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                      lastTransitionTime:
                        type: string
                      reason:
                        type: string
                      message:
                        type: string
  scope: Namespaced
  names:
    plural: memobuildclusters
    singular: memobuildcluster
    kind: MemoBuildCluster
    shortNames:
      - mbcl
  preserveUnknownFields: false
  conversion:
    strategy: Webhook
    webhook:
      conversionReviewVersions: ["v1", "v1beta1"]
      clientConfig:
        service:
          name: memobuild-operator
          namespace: memobuild
          path: /convert